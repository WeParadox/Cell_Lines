site_name: Cell Line Repository
site_description: Culture conditions, handling notes, and references for common cell lines
repo_url: https://github.com/<YOUR_USER_OR_ORG>/<YOUR_REPO>
repo_name: <YOUR_REPO>
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - content.action.edit
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
